<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visite virtuelle Rue Falque</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:1200px;
  margin:auto;
  padding:20px;
  background:#f5f5f5;
}

h1{
 text-align:center;
}

#photo{
 width:100%;
 max-height:700px;
 object-fit:contain;
 background:black;
}

.menu{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
 gap:10px;
 margin-bottom:20px;
}

button{
 padding:10px;
 border:none;
 background:#1f6feb;
 color:white;
 border-radius:6px;
 cursor:pointer;
}
</style>
</head>

<body>

<h1>Visite virtuelle appartement Rue Falque</h1>

<div class="menu">
<button onclick="show('hall-entree.jpeg')">Hall</button>
<button onclick="show('chambre1.jpeg')">Chambre 1</button>
<button onclick="show('chambre2.jpeg')">Chambre 2</button>
<button onclick="show('salon.jpeg')">Salon</button>
<button onclick="show('chambre3.jpeg')">Chambre 3</button>
<button onclick="show('cuisine.jpeg')">Cuisine</button>
<button onclick="show('salle-de-bain.jpeg')">Salle de bains</button>
</div>

hall-entree.jpeg

<script>
function show(image){
  document.getElementById('photo').src=image;
}
</script>

</body>
</html>
